<html lang="vi">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8f9fc;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --line-solid: #cbd5e1;
      --line-dotted: #e2e8f0;
      --primary-color: #6366f1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .tabs-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      padding: 12px 28px;
      font-size: 1.05rem;
      font-weight: 600;
      border: 2px solid var(--primary-color);
      background: transparent;
      color: var(--primary-color);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    
    .tab-btn.active, .tab-btn:hover {
      background: var(--primary-color);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .top-info {
        width: 100%;
        max-width: 1600px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }

    .program-summary {
        display: flex;
        align-items: center;
        gap: 15px;
        background: #fff;
        padding: 12px 25px;
        border-radius: 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        border: 1px solid var(--line-dotted);
        font-size: 1.05rem;
    }
    
    .badge-bachelor {
        background: #eff6ff;
        color: #2563eb;
        padding: 6px 16px;
        border-radius: 12px;
        font-weight: 700;
    }
    
    .badge-engineer {
        background: #faf5ff;
        color: #9333ea;
        padding: 6px 16px;
        border-radius: 12px;
        font-weight: 700;
    }

    .total-tc {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.95rem;
      background: #f1f5f9;
      padding: 8px 20px;
      border-radius: 12px;
    }

    .chart-container {
      position: relative;
      background: #fff;
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
      width: 100%;
      max-width: 1600px;
      overflow-x: auto;
    }

    .y-axis-title {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }

    .grid-layout {
      display: grid;
      grid-template-columns: 360px repeat(16, minmax(70px, 1fr));
      gap: 12px 4px;
      position: relative;
    }

    .year-label {
      text-align: center;
      font-weight: 700;
      color: var(--text-secondary);
      font-size: 1.05rem;
      padding-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .year-line {
      border-right: 2px solid var(--line-solid);
      z-index: 1;
      transform: translateX(2px);
    }

    .semester-line {
      border-right: 1.5px dashed var(--line-dotted);
      z-index: 0;
      transform: translateX(2px);
    }

    .row-label {
      text-align: right;
      padding-right: 15px;
      align-self: center;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 2;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      color: var(--text-primary);
    }
    
    .course-code-id {
      font-family: monospace;
      background: #f1f5f9;
      color: #64748b;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-left: 10px;
      margin-right: 8px;
    }

    .row-label span.line-dash {
      display: inline-block;
      width: 12px;
      height: 2px;
      background-color: #cbd5e1;
    }

    .data-point {
      align-self: center;
      justify-self: center;
      padding: 8px 12px;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.06);
      z-index: 2;
      text-align: center;
      min-width: 65px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    
    .data-point:hover, .data-point.highlighted {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 15px rgba(0,0,0,0.1);
      filter: brightness(1.1);
    }

    .grid-layout.has-highlight .data-point:not(.highlighted) {
      opacity: 0.25;
      filter: grayscale(0.5);
    }

    .semester-axis {
      display: grid;
      grid-template-columns: 360px repeat(16, minmax(70px, 1fr));
      gap: 15px 4px;
      margin-top: 15px;
    }

    .semester-label {
      text-align: center;
      font-weight: 700;
      color: var(--text-secondary);
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .semester-label:hover {
      background: #f1f5f9;
      color: var(--text-primary);
    }

    .semester-label b {
      display: block;
      margin-bottom: 2px;
      font-size: 1.1rem;
    }

    .semester-label.special-col b {
      color: #f59e0b;
    }

    .semester-label::before {
      content: '';
      width: 2px;
      height: 12px;
      background: var(--line-solid);
      margin-bottom: 8px;
    }

    .details-panel {
      margin-top: 2rem;
      background: #fff;
      border-radius: 20px;
      padding: 2rem 2.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
      width: 100%;
      max-width: 1600px;
      border: 1px solid var(--line-dotted);
      display: none; 
    }

    .details-panel.active {
      display: block;
      animation: slideUp 0.3s ease-out;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .details-panel h3 {
      font-size: 1.5rem;
      color: var(--primary-color);
      border-bottom: 2px solid #f1f5f9;
      padding-bottom: 15px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .details-panel h3 span.hk-total {
        font-size: 1rem;
        background: #f8fafc;
        color: var(--text-secondary);
        padding: 6px 16px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }

    .course-card {
      background: #f8fafc;
      padding: 16px 20px;
      border-radius: 12px;
      font-weight: 600;
      border-left-width: 6px;
      border-left-style: solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s;
    }
    
    .course-card:hover {
      transform: translateX(4px);
    }
    
    .course-title-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .course-card .badge {
      background: #e2e8f0;
      color: #334155;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .course-card .badge-dept {
      background: #eef2ff;
      color: #4f46e5;
      font-size: 0.75rem;
      border: 1px solid #c7d2fe;
      padding: 2px 8px;
    }

    .legend-cnpm {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #fff;
        padding: 8px 18px;
        border-radius: 12px;
        border: 2px solid #1e293b;
        font-weight: 600;
        font-size: 0.95rem;
        box-shadow: 0 0 10px rgba(0,0,0,0.05);
        animation: glowPulse 2.5s infinite;
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }
    
    .legend-cnpm:hover {
        transform: scale(1.05);
        background: #f8fafc;
    }
    
    @keyframes glowPulse {
        0% { box-shadow: 0 0 0 0 rgba(30, 41, 59, 0.2); }
        70% { box-shadow: 0 0 0 6px rgba(30, 41, 59, 0); }
        100% { box-shadow: 0 0 0 0 rgba(30, 41, 59, 0); }
    }
    
    .dept-cnpm {
      border: 3px solid #1e293b;
      box-shadow: 0 6px 12px rgba(30,41,59,0.2) !important;
      animation: glowPulse 2.5s infinite;
      font-weight: 800;
      transform: scale(1.03);
      z-index: 5 !important;
    }
  </style>
</head>

    // Biến đổi cấu trúc mảng logic để lấy Info từ Master Catalog
    function getProcessedData() {
      let activeList = [];
      if (currentTab === 'KTPM') activeList = currKTPM;
      else if (currentTab === 'CNTT') activeList = currCNTT;
      else if (currentTab === 'HTTT') activeList = currHTTT;
      else if (currentTab === 'EXCLUSIVE') {
         const cnttIds = new Set(currCNTT.map(c => c.id));
         const htttIds = new Set(currHTTT.map(c => c.id));
         // Toán học tập hợp: Rút các môn chỉ tồn tại trong KTPM mà không có ở CNTT & HTTT
         activeList = currKTPM.filter(c => !cnttIds.has(c.id) && !htttIds.has(c.id));
      }
      else if (currentTab === 'OVERLAP') {
         const allArrays = [...currKTPM, ...currCNTT, ...currHTTT];
         
         const dedup = {};
         allArrays.forEach(c => {
             // Nếu c.id là cụm tự chọn, nạp cả các con của nó vào
             if (electiveUnpackData[c.id]) {
                 electiveUnpackData[c.id].forEach(optId => {
                     if (overlapMapping[optId] && !dedup[optId]) {
                         dedup[optId] = { id: optId, hk: c.hk, group: overlapMapping[optId] };
                     }
                 });
             } else {
                 if (overlapMapping[c.id] && !dedup[c.id]) {
                     dedup[c.id] = { id: c.id, hk: c.hk, group: overlapMapping[c.id] };
                 }
             }
         });
         activeList = Object.values(dedup);
      }
      
      // Unpack các placeholder tự chọn thành môn thực tế trên các Tab thường
      let flatList = [];
      if (currentTab !== 'OVERLAP') {
          activeList.forEach(item => {
             if (electiveUnpackData[item.id]) {
                 electiveUnpackData[item.id].forEach((optId, idx) => {
                     flatList.push({ id: optId, hk: item.hk, isDup: idx > 0, optionGroup: item.id });
                 });
             } else {
                 flatList.push({ ...item, isDup: false });
             }
          });
      } else {
          flatList = activeList.map(item => ({ ...item, isDup: false }));
      }
      
      const hydrated = flatList.map(item => {
        const detail = courseCatalog[item.id] || extraDict[item.id] || { name: item.id, tc: 3, dept: "N/A" };
        return {
           id: item.id,
           name: detail.name,
           tc: detail.tc,
           hk: item.hk,
           dept: detail.dept,
           group: item.group || null,
           isDup: item.isDup
        };
      });

      if (currentTab === 'OVERLAP') {
          return hydrated.sort((a,b) => a.group.localeCompare(b.group) || a.hk - b.hk);
      }
      return hydrated.sort((a,b) => a.hk - b.hk || a.name.localeCompare(b.name));
    }

    function showSemesterDetails(hk) {
      const data = getProcessedData();
      const hkCourses = data.filter(c => c.hk === hk);
      const semTotalTc = hkCourses.reduce((sum, current) => sum + current.tc, 0);

      const panel = document.getElementById("detailsPanel");
      const title = document.getElementById("detailTitle");
      const list = document.getElementById("courseList");
      
      if(hk < 16) {
          const year = Math.ceil(hk / 3);
          title.innerHTML = `Danh sách môn học - HK${hk} (Năm ${year}) <span class="hk-total" id="hkTotalLabel">Tổng: ${semTotalTc} Tín chỉ</span>`;
      } else {
          title.innerHTML = `Các Học phần Tự do (Chưa quy định HK) <span class="hk-total" id="hkTotalLabel">Tổng: ${semTotalTc} Tín chỉ</span>`;
      }
      
      list.innerHTML = "";
      
      hkCourses.forEach(c => {
        let deptBadge = c.dept ? `<span class="badge badge-dept">${c.dept}</span>` : '';

        const item = document.createElement('div');
        item.className = 'course-card';
        item.style.borderLeftColor = getColorForHK(hk);
        item.innerHTML = `
            <div class="course-title-group">
                <span class="course-code-id">${c.id}</span>
                <span>${c.name}</span>
                ${deptBadge}
            </div>
            <span class="badge">${c.tc} TC</span>
        `;
        list.appendChild(item);
      });
      
      panel.classList.add("active");
      
      const grid = document.getElementById("timelineGrid");
      grid.classList.add("has-highlight");
      
      document.querySelectorAll('.data-point').forEach(el => {
        if(el.dataset.hk == hk) el.classList.add("highlighted");
        else el.classList.remove("highlighted");
      });

      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

      }
      
      document.getElementById('btn-ktpm').classList.toggle('active', currentTab === 'KTPM');
      document.getElementById('btn-cntt').classList.toggle('active', currentTab === 'CNTT');
      document.getElementById('btn-httt').classList.toggle('active', currentTab === 'HTTT');
      document.getElementById('btn-exclusive').classList.toggle('active', currentTab === 'EXCLUSIVE');
      document.getElementById('btn-overlap').classList.toggle('active', currentTab === 'OVERLAP');
    }

    document.getElementById('btn-ktpm').onclick = () => { currentTab = 'KTPM'; renderTimeline(); };
    document.getElementById('btn-cntt').onclick = () => { currentTab = 'CNTT'; renderTimeline(); };
    document.getElementById('btn-httt').onclick = () => { currentTab = 'HTTT'; renderTimeline(); };
    document.getElementById('btn-exclusive').onclick = () => { currentTab = 'EXCLUSIVE'; renderTimeline(); };
    document.getElementById('btn-overlap').onclick = () => { currentTab = 'OVERLAP'; renderTimeline(); };

    renderTimeline();
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.data-point') && 
            !e.target.closest('.semester-label') && 
            !e.target.closest('.details-panel') && 
            !e.target.closest('.legend-cnpm')) {
           document.getElementById("timelineGrid").classList.remove("has-highlight");
           document.getElementById("detailsPanel").classList.remove("active");
        }
    });
  </script>
</body>
</html>
